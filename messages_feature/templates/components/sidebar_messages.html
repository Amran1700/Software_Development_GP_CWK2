<div class="message-sidebar">
    <!-- Compose button -->
    <a href="{% url 'compose' %}" class="compose-btn flex items-center justify-center mb-4">
        <i class="bi bi-plus me-2"></i> Compose
    </a>
    <!-- Inbox -->
    <a href="{% url 'inbox' %}" class="side-link {% if request.resolver_match.url_name == 'inbox' %}active{% endif %}">
        <i class="bi bi-inbox"></i> Inbox
        {% if inbox_count %}
        <span class="badge">{{ inbox_count }}</span>
        {% endif %}
    </a>
    <!-- Sent -->
    <a href="{% url 'sent' %}" class="side-link {% if request.resolver_match.url_name == 'sent' %}active{% endif %}">
        <i class="bi bi-send"></i> Sent
    </a>
    <!-- Drafts -->
    <a href="{% url 'drafts' %}" class="side-link {% if request.resolver_match.url_name == 'drafts' %}active{% endif %}">
        <i class="bi bi-pencil"></i> Drafts
        {% if drafts_count %}
        <span class="badge">{{ drafts_count }}</span>
        {% endif %}
    </a>
    <!-- Deleted -->
    <a href="{% url 'deleted' %}" class="side-link {% if request.resolver_match.url_name == 'deleted' %}active{% endif %}">
        <i class="bi bi-trash"></i> Deleted
    </a>

</div>
