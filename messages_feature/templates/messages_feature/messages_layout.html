{% extends 'global.html' %}

{% block content %}

<style>
.page-wrapper {
    display: flex;
    gap: 20px;
    min-height: calc(100vh - 80px);
    align-items: stretch;
}

/* SIDEBAR */
.sidebar-container {
    width: 240px;
    display: flex;
    align-self: stretch;
}

/* make sidebar card fill full height */
.sidebar-container > * {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
}

/* CONTENT AREA */
.messages-content-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* MAIN CONTENT CARD */
.main-card {
    flex: 1;
    border-radius: 12px;
}

/* SIDEBAR ITEMS */
.list-group-item-action {
    transition: all 0.2s ease;
}

.list-group-item-action:hover {
    background-color: #eef3fb !important;
    transform: translateX(4px);
}

.list-group-item.active {
    background: linear-gradient(to right, #4277D6, #6F50A0) !important;
    color: white !important;
    border: none !important;
}

.list-group-item {
    border: none !important;
    padding: 10px 12px;
    font-weight: 500;
}

/* BADGES */
.badge {
    font-size: 0.75rem;
    padding: 4px 8px;
    border-radius: 12px;
}

</style>

<div class="container-fluid">

    <div class="page-wrapper">

        <!-- SIDEBAR -->
        <div class="sidebar-container">
            {% include 'messages_feature/components/sidebar_messages.html' %}
        </div>

        <!-- CONTENT -->
        <div class="messages-content-wrapper">
            {% block messages_content %}{% endblock %}
        </div>

    </div>

</div>

{% endblock %}
