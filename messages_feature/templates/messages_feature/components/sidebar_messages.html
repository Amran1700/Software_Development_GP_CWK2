<div class="sidebar-messages">
    <h3>Mailbox</h3>
    <ul>
        <li><a href="{% url 'inbox' %}" class="{% if request.resolver_match.url_name == 'inbox' %}active{% endif %}">
            <i class="bi bi-inbox"></i> Inbox
            {% if inbox_count %}<span class="badge">{{ inbox_count }}</span>{% endif %}
        </a></li>
        <li><a href="{% url 'sent' %}" class="{% if request.resolver_match.url_name == 'sent' %}active{% endif %}">
            <i class="bi bi-send"></i> Sent
        </a></li>
        <li><a href="{% url 'drafts' %}" class="{% if request.resolver_match.url_name == 'drafts' %}active{% endif %}">
            <i class="bi bi-pencil"></i> Drafts
            {% if drafts_count %}<span class="badge">{{ drafts_count }}</span>{% endif %}
        </a></li>
        <li><a href="{% url 'deleted' %}" class="{% if request.resolver_match.url_name == 'deleted' %}active{% endif %}">
            <i class="bi bi-trash"></i> Deleted
        </a></li>
    </ul>
</div>
