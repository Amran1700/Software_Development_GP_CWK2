{% extends 'messages_feature/messages_layout.html' %}

{% block title %}Edit Draft{% endblock %}

{% block messages_content %}

<div class="card border-0 shadow-sm main-card">

    <div class="card-body p-4">

        <h3 class="fw-bold mb-4" style="color:#000;">Edit Draft</h3>

        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <!-- recipients of the draft if already in there are shown -->
            <div class="mb-3">

                <label class="fw-bold mb-2">
                    Recipients <span style="color:red;">*</span>
                    
                </label>

                <div class="card p-3"
                     style="max-height:200px; overflow-y:auto; border-radius:12px; background:#f7f7f7;">

                    {% for user in users %}
                    <div class="form-check mb-2">

                        <input type="checkbox"
                               name="recipient"
                               value="{{ user.id }}"
                               class="form-check-input"
                               id="user{{ user.id }}">

                        <label class="form-check-label" for="user{{ user.id }}">
                            {{ user.username }}
                        </label>

                    </div>
                    {% endfor %}

                </div>
            </div>

            <!-- shows if anything is already in the subject -->
            <div class="mb-3">
                <label class="fw-bold mb-2">
                    Subject
                </label>

                <input type="text"
                       name="subject"
                       value="{{ message.subject }}"
                       class="form-control"
                       style="border-radius:10px;">
            </div>

            <!-- shows the body of the draft if already in there -->
            <div class="mb-3">

                <label class="fw-bold mb-2">
                    Message <span style="color:red;">*</span>
                </label>

                <textarea name="body"
                          rows="6"
                          class="form-control"
                          style="border-radius:10px;">{{ message.body }}</textarea>

            </div>

            <!-- quick actions -->
            <div class="d-flex gap-2">

                <button type="submit"
                        name="status"
                        value="sent"
                        class="btn btn-dark px-4"
                        style="border-radius:10px;">
                    Send
                </button>

                <button type="submit"
                        name="status"
                        value="draft"
                        class="btn btn-outline-dark px-4"
                        style="border-radius:10px;">
                    Save Draft
                </button>

            </div>

        </form>

    </div>
</div>

{% endblock %}
