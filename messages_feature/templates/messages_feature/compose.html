{% extends 'messages_feature/messages_layout.html' %}

{% block title %}Compose{% endblock %}

{% block messages_content %}

<div class="card border-0 shadow-sm main-card">

    <div class="card-body p-4">

        <h3 class="fw-bold mb-4" style="color:#4277D6;">Compose Message</h3>

        <!-- error message -->
        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <!-- Recipients -->
            <label class="fw-bold mb-2">Recipients</label>

            <div class="card p-3 mb-3" style="max-height: 200px; overflow-y:auto;">

                {% for user in users %}
                <div class="form-check">

                    <input type="checkbox"
                           name="recipient"
                           value="{{ user.id }}"
                           class="form-check-input"
                           id="user{{ user.id }}">

                    <label class="form-check-label" for="user{{ user.id }}">
                        {{ user.username }}
                    </label>

                </div>
                {% endfor %}

            </div>

            <!-- subject -->
            <input type="text"
                   name="subject"
                   class="form-control mb-3"
                   placeholder="Subject (optional)">

            <!-- body-->
            <textarea name="body"
                      class="form-control mb-3"
                      rows="6"
                      placeholder="Write your message..."></textarea>

            <!-- quick action buttons -->
            <button type="submit" name="status" value="sent" class="btn btn-primary">
                Send
            </button>

            <button type="submit" name="status" value="draft" class="btn btn-outline-secondary">
                Save Draft
            </button>

        </form>

    </div>
</div>

{% endblock %}
