{% extends 'messages_feature/messages_layout.html' %}

{% block title %}Compose{% endblock %}

{% block messages_content %}

<div class="card border-0 shadow-sm main-card">

    <div class="card-body p-4">

        <!-- Header -->
        <h3 class="fw-bold mb-4" style="color:#111111;">
            Compose Message
        </h3>

        <!-- error message -->
        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <!-- Recipients Section to pick 1 or multiple recipients -->
            <div class="mb-3">

                <label class="fw-semibold mb-2">
                    Recipients <span style="color:red;">*</span>
                </label>

                <div class="card border-0 p-3"
                     style="max-height: 220px; overflow-y:auto; background:#f7f7f7; border-radius: 12px;">

                    {% for user in users %}
                    <div class="form-check mb-2">

                        <input type="checkbox"
                               name="recipient"
                               value="{{ user.id }}"
                               class="form-check-input"
                               id="user{{ user.id }}">

                        <label class="form-check-label" for="user{{ user.id }}">
                            {{ user.username }}
                        </label>

                    </div>
                    {% empty %}
                        <span class="text-muted">No users available</span>
                    {% endfor %}

                </div>
            </div>

            <!-- subject -->
            <div class="mb-3">
                <label class="fw-semibold mb-2">Subject</label>
                <input type="text"
                       name="subject"
                       class="form-control"
                       style="border-radius: 10px;"
                       placeholder="Enter subject (optional)">
            </div>

            <!-- body area of the message -->
            <div class="mb-4">
                <label class="fw-semibold mb-2">
                    Message <span style="color:red;">*</span>
                </label>

                <textarea name="body"
                          class="form-control"
                          rows="6"
                          style="border-radius: 10px;"
                          placeholder="Write your message..."></textarea>
            </div>

            <!-- buttons to send and save the email as a draft -->
            <div class="d-flex gap-2">

                <button type="submit"
                        name="status"
                        value="sent"
                        class="btn btn-dark px-4"
                        style="border-radius: 10px;">
                    Send
                </button>

                <button type="submit"
                        name="status"
                        value="draft"
                        class="btn btn-outline-dark px-4"
                        style="border-radius: 10px;">
                    Save Draft
                </button>

            </div>

        </form>

    </div>
</div>

{% endblock %}
