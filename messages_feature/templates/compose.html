{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compose Message - Sky Engineering</title>
    <link rel="stylesheet" href="{% static 'messages.css' %}" />
</head>
<body>
<div class="main-container">
    {% include 'components/sidebar_messages.html' %}

    <div class="inbox-content">
        <h1>Compose Message</h1>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <label>Recipient <span class="required">*</span></label>
            <select name="recipient" required>
                <option value="">-- Select User --</option>
                {% for user in users %}
                    <option value="{{ user.id }}"
                        {% if initial_receiver and user.id == initial_receiver %}selected{% endif %}>
                        {{ user.username }}
                    </option>
                {% endfor %}
            </select>

            <label>Subject</label>
            <input type="text" name="subject" value="{{ initial_subject|default:'' }}" />

            <label>Message <span class="required">*</span></label>
            <textarea name="body" rows="8" required></textarea>

            <div class="action-buttons">
                <button type="submit" name="status" value="sent" class="btn btn-primary">Send</button>
                <button type="submit" name="status" value="draft" class="btn btn-secondary">Save as Draft</button>
                <a href="{% url 'inbox' %}" class="btn btn-danger">Discard</a>
            </div>
        </form>
        <a href="{% url 'inbox' %}" class="btn btn-secondary mt-3">Back to Inbox</a>
    </div>
</div>
</body>
</html>
