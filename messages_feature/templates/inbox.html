{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inbox - Sky Engineering</title>

    <!-- Link to your messages CSS -->
    <link rel="stylesheet" href="{% static 'messages.css' %}" />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <div class="main-container">
      <!-- Sidebar -->
      {% include 'components/sidebar_messages.html' %}

      <!-- Main Inbox Content -->
      <div class="inbox-content">
        <h1>Inbox</h1>

        <table class="inbox-table">
          <thead>
            <tr>
              <th>From</th>
              <th>Subject</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody>
            {% for message in messages %}
            <tr class="{% if not message.read_status %}unread{% endif %}">
              <td>{{ message.sender.username }}</td>
              <td>
                <a href="{% url 'message_detail' message.id %}">
                  {{ message.subject }}
                </a>
              </td>
              <td>{{ message.timestamp|date:"M d, Y H:i" }}</td>
            </tr>
            {% empty %}
            <tr>
              <td colspan="3">No messages found.</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
