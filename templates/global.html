<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sky Engineering Portal{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f4f6fb; }
        .navbar { background: linear-gradient(to right, #4277D6, #6C71CF, #6F50A0); }
        .navbar-brand { color: white !important; font-weight: 700; font-size: 1.3rem; }
        .nav-link { color: white !important; font-weight: 500; padding: 8px 16px; border-radius: 6px; transition: background 0.2s; }
        .nav-link:hover { background-color: rgba(255,255,255,0.15); font-weight: 700; }
        .nav-link.active { background-color: rgba(255,255,255,0.25); }
        .main-content { margin-top: 80px; padding: 30px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/"><i class="bi bi-building"></i> Sky Engineering</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link {% block nav_home %}{% endblock %}" href="/"><i class="bi bi-house"></i> Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block nav_teams %}{% endblock %}" href="/teams/"><i class="bi bi-people"></i> Teams</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block nav_organisation %}{% endblock %}" href="/departments/"><i class="bi bi-diagram-3"></i> Organisation</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block nav_messages %}{% endblock %}" href="/messages/"><i class="bi bi-envelope"></i> Messages</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block nav_schedule %}{% endblock %}" href="/schedule/calendar/"><i class="bi bi-calendar"></i> Schedule</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block nav_reports %}{% endblock %}" href="/reports/"><i class="bi bi-bar-chart"></i> Reports</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block nav_admin %}{% endblock %}" href="/admin/"><i class="bi bi-shield-lock"></i> Admin</a>
                </li>
                <li class="nav-item ms-3">
                    {% if user.is_authenticated %}
                        <span class="text-white small me-2">{{ user.username }}</span>
                        <a href="/accounts/logout/" class="btn btn-outline-light btn-sm">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </a>
                    {% else %}
                        <a href="/accounts/login/" class="btn btn-outline-light btn-sm">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Login
                        </a>
                    {% endif %}
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="main-content">
    {% block content %}
    {% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
