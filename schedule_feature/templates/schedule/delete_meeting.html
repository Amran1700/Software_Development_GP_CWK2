{% extends "global.html" %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
  * { font-family: 'Roboto', sans-serif; }
  :root { --brand-gradient: linear-gradient(135deg, #4277D6, #6C71CF, #6F50A0); }
  .delete-wrapper { max-width: 500px; margin: 60px auto; padding: 0 20px; text-align: center; }
  .delete-card { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .delete-icon { width: 64px; height: 64px; background: #fff0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 1.8rem; color: #e53e3e; }
  .delete-title { font-weight: 700; font-size: 1.3rem; color: #222; margin-bottom: 8px; }
  .delete-sub { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
  .meeting-name { font-weight: 600; color: #333; }
  .btn-confirm { background: #e53e3e; color: white; border: none; padding: 11px 28px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; cursor: pointer; }
  .btn-confirm:hover { background: #c53030; }
  .btn-cancel { border: 1px solid #ddd; background: white; color: #555; padding: 10px 24px; border-radius: 8px; font-weight: 500; text-decoration: none; font-size: 0.9rem; }
</style>

<!-- Page wrapper: centres the delete confirmation card on the screen -->
<div class="delete-wrapper">

  <!-- Delete confirmation card -->
  <div class="delete-card">

    <!-- Red trash icon at the top of the card -->
    <div class="delete-icon"><i class="bi bi-trash"></i></div>

    <!-- Card title -->
    <div class="delete-title">Delete Meeting</div>

    <!-- Warning message showing the name of the meeting being deleted -->
    <div class="delete-sub">
      Are you sure you want to delete<br>
      <!-- Displays the meeting title pulled from the database -->
      <span class="meeting-name">"{{ meeting.title }}"</span>?<br>
      This action cannot be undone.
    </div>

    <!-- Form: submits a POST request to delete the meeting -->
    <form method="POST">
      {% csrf_token %}
      <div class="d-flex gap-3 justify-content-center">

        <!-- Cancel button: goes back to the meeting detail page without deleting -->
        <a href="{% url 'schedule:meeting_detail' meeting.pk %}" class="btn-cancel">Cancel</a>

        <!-- Confirm button: submits the form and permanently deletes the meeting -->
        <button type="submit" class="btn-confirm"><i class="bi bi-trash me-1"></i>Delete Meeting</button>

      </div>
    </form>

  </div>
</div>

{% endblock %}
